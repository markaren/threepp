
name: Build

on: [push, workflow_dispatch]

jobs:
  linux:

    runs-on: ${{ matrix.os }}
    env:
      CC: gcc-${{ matrix.compiler_version }}
      CXX: g++-${{ matrix.compiler_version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04 ]
        compiler_version: [ 11 ]

    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
          libxinerama-dev \
          libxcursor-dev \
          xorg-dev \
          libglu1-mesa-dev \
          pkg-config \
          libglfw3 \
          libglfw3-dev

      - name: Configure and build
        run: |
          cmake . -B build -DTHREEPP_USE_EXTERNAL_GLFW=ON -DCMAKE_BUILD_TYPE="Release"
          cmake --build build

      - name: Test
        run: |
          cd build/tests
          ctest --output-on-failure

  linux-no-glfw:

    runs-on: ${{ matrix.os }}
    env:
      CC: gcc-${{ matrix.compiler_version }}
      CXX: g++-${{ matrix.compiler_version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04 ]
        compiler_version: [ 11 ]

    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
          libxinerama-dev \
          libxcursor-dev \
          xorg-dev \
          libglu1-mesa-dev \
          pkg-config

      - name: Configure and build
        run: |
          cmake . -B build -DTHREEPP_WITH_GLFW=OFF -DTHREEPP_BUILD_EXAMPLES=OFF -DCMAKE_BUILD_TYPE="Release"
          cmake --build build

      - name: Test
        run: |
          cd build/tests
          ctest --output-on-failure


  # Compile-only smoke test for the Vulkan path-tracing backend.
  # GitHub runners have no GPU, but the backend and its 550+ GLSL shaders can
  # still be *compiled*: the Vulkan loader links without a physical device, and
  # glslangValidator needs no GPU to emit SPIR-V. This guards the largest and
  # most actively-developed subsystem (VulkanRenderer.cpp + shaders) against
  # bit-rot on non-MSVC toolchains. It is NOT a runtime / rendering test.
  linux-vulkan:

    runs-on: ubuntu-22.04
    env:
      CC: gcc-11
      CXX: g++-11

    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
          libxinerama-dev \
          libxcursor-dev \
          xorg-dev \
          libglu1-mesa-dev \
          pkg-config

      - name: Install Vulkan SDK (headers, loader, current glslangValidator)
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk
          glslangValidator --version

      - name: Fetch Vulkan Memory Allocator header
        run: |
          mkdir -p "$GITHUB_WORKSPACE/third_party/vma"
          wget -qO "$GITHUB_WORKSPACE/third_party/vma/vk_mem_alloc.h" \
            https://raw.githubusercontent.com/GPUOpen-LibrariesAndSDKs/VulkanMemoryAllocator/v3.1.0/include/vk_mem_alloc.h

      - name: Configure and build (library only — compile check)
        run: |
          cmake . -B build \
            -DTHREEPP_WITH_VULKAN=ON \
            -DTHREEPP_BUILD_EXAMPLES=OFF \
            -DTHREEPP_BUILD_TESTS=OFF \
            -DVMA_INCLUDE_DIR="$GITHUB_WORKSPACE/third_party/vma" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build


  windows:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]

    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          cmake . -A x64 -B build -DTHREEPP_TREAT_WARNINGS_AS_ERRORS=ON -DCMAKE_BUILD_TYPE="Release"
          cmake --build build --config Release

      - name: Test
        run: |
          cd build/tests
          ctest -C Release --output-on-failure


  darwin:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          cmake . -B build -DTHREEPP_BUILD_EXAMPLES=OFF -DTHREEPP_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE="Release"
          cmake --build build


  linux-emscripten:

    runs-on: ${{ matrix.os }}
    env:
      CC: gcc-${{ matrix.compiler_version }}
      CXX: g++-${{ matrix.compiler_version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04 ]
        compiler_version: [ 11 ]

    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
          libxinerama-dev \
          libxcursor-dev \
          xorg-dev \
          libglu1-mesa-dev \
          pkg-config

      - name: Cache naga-cli
        id: cache-naga
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/naga
          key: naga-cli-${{ runner.os }}-v1

      - name: Install naga-cli
        if: steps.cache-naga.outputs.cache-hit != 'true'
        run: cargo install naga-cli --locked

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.6
          actions-cache-folder: 'emsdk-cache'

      - name: Configure and build
        run: |
          cmake . -B build -DCMAKE_TOOLCHAIN_FILE=${{env.EMSDK}}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake -DTHREEPP_BUILD_TESTS=OFF -DTHREEPP_FETCH_ASSIMP=OFF -DCMAKE_BUILD_TYPE="Release"
          cmake --build build
