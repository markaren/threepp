
name: Build

on: [push, workflow_dispatch]

jobs:
  linux:

    runs-on: ${{ matrix.os }}
    env:
      CC: gcc-${{ matrix.compiler_version }}
      CXX: g++-${{ matrix.compiler_version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04 ]
        compiler_version: [ 11 ]

    steps:
      - uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
          libxinerama-dev \
          libxcursor-dev \
          xorg-dev \
          libglu1-mesa-dev \
          pkg-config \
          libglfw3 \
          libglfw3-dev

      - name: Configure and build
        run: |
          cmake . -B build -DTHREEPP_USE_EXTERNAL_GLFW=ON -DCMAKE_BUILD_TYPE="Release"
          cmake --build build

      - name: Test
        run: |
          cd build/tests
          ctest --output-on-failure

  linux-no-glfw:

    runs-on: ${{ matrix.os }}
    env:
      CC: gcc-${{ matrix.compiler_version }}
      CXX: g++-${{ matrix.compiler_version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04 ]
        compiler_version: [ 11 ]

    steps:
      - uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
          libxinerama-dev \
          libxcursor-dev \
          xorg-dev \
          libglu1-mesa-dev \
          pkg-config

      - name: Configure and build
        run: |
          cmake . -B build -DTHREEPP_WITH_GLFW=OFF -DTHREEPP_BUILD_EXAMPLES=OFF -DCMAKE_BUILD_TYPE="Release"
          cmake --build build

      - name: Test
        run: |
          cd build/tests
          ctest --output-on-failure


  # Compile-only smoke test for the Vulkan path-tracing backend.
  # GitHub runners have no GPU, but the backend and its 550+ GLSL shaders can
  # still be *compiled*: the Vulkan loader links without a physical device, and
  # glslangValidator needs no GPU to emit SPIR-V. This guards the largest and
  # most actively-developed subsystem (VulkanRenderer.cpp + shaders) against
  # bit-rot on non-MSVC toolchains. It is NOT a runtime / rendering test.
  linux-vulkan:

    runs-on: ubuntu-22.04
    env:
      CC: gcc-11
      CXX: g++-11

    steps:
      - uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
          libxinerama-dev \
          libxcursor-dev \
          xorg-dev \
          libglu1-mesa-dev \
          pkg-config

      - name: Install Vulkan SDK (headers, loader, current glslangValidator)
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk
          glslangValidator --version

      - name: Fetch Vulkan Memory Allocator header
        run: |
          mkdir -p "$GITHUB_WORKSPACE/third_party/vma"
          wget -qO "$GITHUB_WORKSPACE/third_party/vma/vk_mem_alloc.h" \
            https://raw.githubusercontent.com/GPUOpen-LibrariesAndSDKs/VulkanMemoryAllocator/v3.1.0/include/vk_mem_alloc.h

      - name: Configure and build (library only — compile check)
        run: |
          cmake . -B build \
            -DTHREEPP_WITH_VULKAN=ON \
            -DTHREEPP_BUILD_EXAMPLES=OFF \
            -DTHREEPP_BUILD_TESTS=OFF \
            -DVMA_INCLUDE_DIR="$GITHUB_WORKSPACE/third_party/vma" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build


  windows:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]

    steps:
      - uses: actions/checkout@v6

      # Ninja ships on the windows image but, unlike the VS generator, needs the
      # MSVC toolchain (cl.exe) on PATH. Activate the x64 developer environment.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure and build
        run: |
          cmake . -B build -G Ninja -DTHREEPP_TREAT_WARNINGS_AS_ERRORS=ON -DCMAKE_BUILD_TYPE="Release"
          cmake --build build

      - name: Test
        run: |
          cd build/tests
          ctest --output-on-failure


  darwin:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]

    steps:
      - uses: actions/checkout@v6

      - name: Configure and build
        run: |
          cmake . -B build -DTHREEPP_BUILD_EXAMPLES=OFF -DTHREEPP_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE="Release"
          cmake --build build


  linux-emscripten:

    # On master, pages.yml builds Emscripten and deploys it to GitHub Pages, so
    # skip this duplicate compile-check there. Still runs on every other branch.
    if: github.ref != 'refs/heads/master'

    runs-on: ${{ matrix.os }}
    env:
      CC: gcc-${{ matrix.compiler_version }}
      CXX: g++-${{ matrix.compiler_version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04 ]
        compiler_version: [ 11 ]

    steps:
      - uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
          libxinerama-dev \
          libxcursor-dev \
          xorg-dev \
          libglu1-mesa-dev \
          pkg-config

      - name: Cache naga-cli
        id: cache-naga
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/naga
          key: naga-cli-${{ runner.os }}-v1

      - name: Install naga-cli
        if: steps.cache-naga.outputs.cache-hit != 'true'
        run: cargo install naga-cli --locked

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.6
          actions-cache-folder: 'emsdk-cache'

      - name: Configure and build
        run: |
          cmake . -B build -DCMAKE_TOOLCHAIN_FILE=${{env.EMSDK}}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake -DTHREEPP_BUILD_TESTS=OFF -DTHREEPP_FETCH_ASSIMP=OFF -DCMAKE_BUILD_TYPE="Release"
          cmake --build build


  # Build the pybind11 Python bindings (the `threepp` module) and run the binding
  # test-suite. Like the Vulkan job, this can't exercise the GPU-only paths — the
  # PhysX direct-GPU + CUDA/torch RL stuff needs a real GPU the runners don't have —
  # so it builds GL-only: the module is compiled (catching binding breaks across the
  # matrix of Python versions) and the GL + math/scene/loader/imgui tests run on
  # Mesa's software rasteriser under a virtual display. The PhysX and Vulkan tests
  # skip themselves on a GL-only build (pytest.mark.skipif on threepp.HAS_*).
  python-bindings:

    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.12' ]

    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
          libxinerama-dev \
          libxcursor-dev \
          xorg-dev \
          libglu1-mesa-dev \
          pkg-config \
          libglfw3 \
          libglfw3-dev \
          libgl1-mesa-dri \
          xvfb

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python test deps
        run: python -m pip install --upgrade pip pytest numpy pillow

      - name: Build the threepp module (GL only — PhysX/Vulkan need a GPU)
        run: |
          cmake . -B build \
            -DTHREEPP_WITH_PYTHON=ON \
            -DTHREEPP_USE_EXTERNAL_GLFW=ON \
            -DTHREEPP_BUILD_TESTS=OFF \
            -DTHREEPP_BUILD_EXAMPLES=OFF \
            -DPYBIND11_FINDPYTHON=ON \
            -DPython_EXECUTABLE=$(which python) \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target threepp_py -j 2

      - name: Run binding tests (headless GL under Xvfb)
        working-directory: python
        env:
          LIBGL_ALWAYS_SOFTWARE: '1'
        run: xvfb-run -a -s "-screen 0 1280x1024x24" python -m pytest -ra
